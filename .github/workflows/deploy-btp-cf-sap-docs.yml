name: Deploy SAP Docs to BTP CF

on:
  schedule:
    # Runs after the 01:00 UTC GHCR corpus refresh window.
    - cron: "0 5 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-btp-cf-sap-docs
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-22.04
    timeout-minutes: 45
    environment:
      name: btp-cf

    steps:
      - name: Checkout deployment descriptors
        uses: actions/checkout@v4

      - name: Install Cloud Foundry CLI
        run: |
          set -euo pipefail
          wget -q -O - https://packages.cloudfoundry.org/debian/cli.cloudfoundry.org.key \
            | sudo gpg --dearmor -o /usr/share/keyrings/cli.cloudfoundry.org.gpg
          echo "deb [signed-by=/usr/share/keyrings/cli.cloudfoundry.org.gpg] https://packages.cloudfoundry.org/debian stable main" \
            | sudo tee /etc/apt/sources.list.d/cloudfoundry-cli.list
          sudo apt-get update
          sudo apt-get install -y cf8-cli
          cf version

      - name: Log in to Cloud Foundry
        env:
          CF_API: ${{ secrets.CF_API }}
          CF_USERNAME: ${{ secrets.CF_USERNAME }}
          CF_PASSWORD: ${{ secrets.CF_PASSWORD }}
          CF_ORG: ${{ secrets.CF_ORG }}
          CF_SPACE: ${{ secrets.CF_SPACE }}
        run: |
          set -euo pipefail
          for name in CF_API CF_USERNAME CF_PASSWORD CF_ORG CF_SPACE; do
            if [ -z "${!name}" ]; then
              echo "Missing required secret: ${name}" >&2
              exit 1
            fi
          done
          cf api "$CF_API"
          cf auth "$CF_USERNAME" "$CF_PASSWORD"
          cf target -o "$CF_ORG" -s "$CF_SPACE"

      - name: Deploy published GHCR image
        run: |
          set -euo pipefail
          cf push -f manifest-btp-cf-sap-docs.yml
          cf app mcp-sap-docs

      - name: Smoke test health endpoint
        run: |
          set -euo pipefail
          route="$(cf app mcp-sap-docs | awk '/^routes:/ { print $2; exit }' | tr ',' '\n' | head -n 1)"
          if [ -z "$route" ]; then
            echo "Could not determine app route" >&2
            exit 1
          fi
          curl -fsS "https://${route}/health"
